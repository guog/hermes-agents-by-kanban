services:
  tooling-sync:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:v2026.7.20@sha256:a6ce64e2038867885c2c90f6602425e6e70293d5e6d952a0e603a99265e01c40}
    pull_policy: never
    user: "0:0"
    entrypoint: ["/bin/bash", "/opt/fleet/scripts/sync-tooling.sh"]
    restart: "no"
    volumes:
      - tooling:/opt/fleet/vendor
      - ./scripts:/opt/fleet/scripts:ro
      - ./config:/opt/fleet/config:ro

  hermes:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:v2026.7.20@sha256:a6ce64e2038867885c2c90f6602425e6e70293d5e6d952a0e603a99265e01c40}
    pull_policy: never
    container_name: hermes-sdd
    restart: unless-stopped
    command: ["sleep", "infinity"]
    depends_on:
      tooling-sync:
        condition: service_completed_successfully
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:?run ./scripts/init-deployment-env.sh}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH:?run ./scripts/init-deployment-env.sh}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_DASHBOARD_BASIC_AUTH_SECRET:?run ./scripts/init-deployment-env.sh}
      FLEET_BUNDLE_REF: ${FLEET_BUNDLE_REF:?run ./scripts/init-deployment-env.sh}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      PATH: /opt/fleet/vendor/current/bin:/opt/hermes/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      FLEET_MODEL: ${FLEET_MODEL:-}
      FLEET_FORCE_CONFIG: ${FLEET_FORCE_CONFIG:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NOUS_API_KEY: ${NOUS_API_KEY:-}
      GIT_COMMIT_NAME_PRD_WRITER: ${GIT_COMMIT_NAME_PRD_WRITER:-}
      GIT_COMMIT_EMAIL_PRD_WRITER: ${GIT_COMMIT_EMAIL_PRD_WRITER:-}
      GIT_COMMIT_NAME_SPEC_WRITER: ${GIT_COMMIT_NAME_SPEC_WRITER:-}
      GIT_COMMIT_EMAIL_SPEC_WRITER: ${GIT_COMMIT_EMAIL_SPEC_WRITER:-}
      GIT_COMMIT_NAME_PLANNER: ${GIT_COMMIT_NAME_PLANNER:-}
      GIT_COMMIT_EMAIL_PLANNER: ${GIT_COMMIT_EMAIL_PLANNER:-}
      GIT_COMMIT_NAME_TASKER: ${GIT_COMMIT_NAME_TASKER:-}
      GIT_COMMIT_EMAIL_TASKER: ${GIT_COMMIT_EMAIL_TASKER:-}
      GIT_COMMIT_NAME_CODER: ${GIT_COMMIT_NAME_CODER:-}
      GIT_COMMIT_EMAIL_CODER: ${GIT_COMMIT_EMAIL_CODER:-}
    ports:
      - "127.0.0.1:${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      - tooling:/opt/fleet/vendor:ro
      - ./profiles:/opt/fleet/profiles:ro
      - ./templates:/opt/fleet/templates:ro
      - ./schemas:/opt/fleet/schemas:ro
      - ./scripts:/opt/fleet/scripts:ro
      - ./patches:/opt/fleet/patches:ro
      - ./config:/opt/fleet/config:ro
      - ./scripts/runtime-patch-hermes.sh:/etc/cont-init.d/017-hermes-runtime-patch:ro
      - ./scripts/container-bootstrap.sh:/etc/cont-init.d/018-hermes-sdd-fleet:ro
      - ./scripts/start-profile-gateways.sh:/etc/cont-init.d/021-hermes-sdd-gateways:ro
      - ${HERMES_DATA_DIR:-./.runtime/hermes}:/opt/data
      - ${PROJECTS_DIR:-./.runtime/projects}:/workspace/projects
    shm_size: 1gb
    labels:
      io.hermes.fleet.bundle-revision: ${FLEET_BUNDLE_REF:?run ./scripts/init-deployment-env.sh}

volumes:
  tooling:
    name: ${TOOLING_VOLUME_NAME:-hermes-sdd-tooling}
