_config_version: 33
model:
  provider: openai-codex
  default: gpt-5.6-sol
  base_url: https://chatgpt.com/backend-api/codex
agent:
  reasoning_effort: high
toolsets: [file, terminal]
platform_toolsets:
  feishu: [file, terminal]
group_sessions_per_user: true
terminal:
  backend: local
  cwd: /workspace/projects
  home_mode: profile
approvals:
  mode: off
memory:
  memory_enabled: true
  user_profile_enabled: false
  write_approval: true
curator:
  prune_builtins: false
dashboard:
  show_token_analytics: true
skills:
  disabled:
    - airtable
    - architecture-diagram
    - arxiv
    - ascii-art
    - ascii-video
    - audiocraft-audio-generation
    - blender-mcp
    - blogwatcher
    - claude-design
    - evaluating-llms-harness
    - github-auth
    - github-code-review
    - github-issues
    - github-pr-workflow
    - github-repo-management
    - google-workspace
    - heartmula
    - himalaya
    - huggingface-hub
    - hyperframes
    - jupyter-live-kernel
    - kanban-video-orchestrator
    - llama-cpp
    - manim-video
    - maps
    - minecraft-modpack-server
    - notion
    - obsidian
    - openhue
    - p5js
    - petdex
    - pokemon-player
    - polymarket
    - research-paper-writing
    - segment-anything-model
    - serving-llms-vllm
    - songsee
    - songwriting-and-ai-music
    - spike
    - teams-meeting-pipeline
    - touchdesigner-mcp
    - weights-and-biases
    - youtube-content
    - yuanbao
  external_dirs:
    - /opt/skills/gitlab
    - /opt/skills/lark
  template_vars: true
  inline_shell: false
  guard_agent_created: true
  write_approval: true
kanban:
  dispatch_in_gateway: false
platforms:
  feishu:
    extra:
      ws_reconnect_interval: 120
      ws_ping_interval: 30
      default_group_policy: open
