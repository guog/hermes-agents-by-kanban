_config_version: 33
model:
  provider: openai-codex
  default: gpt-5.6-sol
  base_url: https://chatgpt.com/backend-api/codex
agent:
  reasoning_effort: high
toolsets: [file, terminal]
terminal:
  backend: local
  cwd: /workspace/projects
  home_mode: profile
approvals:
  mode: off
memory:
  memory_enabled: true
  user_profile_enabled: false
  write_approval: true
curator:
  prune_builtins: false
dashboard:
  show_token_analytics: true
skills:
  disabled: [ascii-video, comfyui, manim-video, touchdesigner-mcp, hyperframes, kanban-video-orchestrator, blender-mcp, gif-search, youtube-content, songwriting-and-ai-music, heartmula, songsee, audiocraft-audio-generation, openhue, minecraft-modpack-server, pokemon-player]
  external_dirs: [/opt/skills/gitlab]
  template_vars: true
  inline_shell: false
  guard_agent_created: true
  write_approval: true
