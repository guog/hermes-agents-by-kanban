name: tasker
version: 0.1.0
description: Compiles approved SPEC and PLAN artifacts into a stable executable task DAG
hermes_requires: ">=0.18.2"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Tasker token with branch and MR permission
    required: true
