name: code-reviewer
version: 0.2.0
description: Reviews the exact tested head of the one PRD delivery MR
hermes_requires: ">=0.19.0"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Reporter token with API permission to clone and comment on MRs
    required: true
