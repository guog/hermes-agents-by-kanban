name: fde
version: 0.2.0
description: Human-facing Feishu agent that triages field input into normal GitLab Issues
hermes_requires: ">=0.19.0"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Reporter token with API permission to read repositories and create normal Issues
    required: true
  - name: GITLAB_ALLOWED_GROUPS
    description: Comma-separated GitLab group path allowlist
    required: true
  - name: FEISHU_APP_ID
    description: FDE bot App ID
    required: true
  - name: API_SERVER_PORT
    description: Gateway-local API port unique inside the container
    required: true
  - name: FEISHU_APP_SECRET
    description: FDE bot App Secret
    required: true
