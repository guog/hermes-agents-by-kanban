_config_version: 33
model: ""
toolsets: [kanban, terminal, file]
platform_toolsets:
  feishu: [kanban, terminal, file]

group_sessions_per_user: true

terminal:
  backend: local
  cwd: /workspace/projects
  home_mode: profile

memory:
  memory_enabled: true
  user_profile_enabled: true
  write_approval: true

skills:
  disabled: [ascii-video, comfyui, manim-video, touchdesigner-mcp, hyperframes, kanban-video-orchestrator, blender-mcp, gif-search, youtube-content, songwriting-and-ai-music, heartmula, songsee, audiocraft-audio-generation, openhue, minecraft-modpack-server, pokemon-player]
  external_dirs:
    - /opt/fleet/vendor/current/gitlab/skills
    - /opt/fleet/vendor/current/lark/skills
  template_vars: true
  inline_shell: false
  guard_agent_created: true
  write_approval: true

kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 20
  failure_limit: 3
  auto_decompose: false
  auto_promote_children: true
  orchestrator_profile: dispatcher
  default_assignee: dispatcher
  max_in_progress: 1
  max_in_progress_per_profile: 1

dashboard:
  kanban:
    lane_by_profile: true
    include_archived_by_default: false
    render_markdown: true

platforms:
  feishu:
    extra:
      ws_reconnect_interval: 120
      ws_ping_interval: 30
      default_group_policy: allowlist
