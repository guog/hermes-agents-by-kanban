name: dispatcher
version: 0.1.0
description: Hermes SDD control-plane dispatcher for Kanban, GitLab gates and Feishu notifications
hermes_requires: ">=0.18.2"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Dispatcher token with read and checked-head merge permission
    required: true
  - name: FEISHU_APP_ID
    description: Hermes dispatcher bot App ID
    required: true
  - name: FEISHU_APP_SECRET
    description: Hermes dispatcher bot App Secret
    required: true
