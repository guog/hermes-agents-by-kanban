name: dispatcher
version: 0.2.0
description: Multi-project one-PRD one-MR control plane for Kanban, GitLab gates and Feishu
hermes_requires: ">=0.19.0"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Maintainer token allowed to checked-head merge the protected default branch
    required: true
  - name: GITLAB_ALLOWED_GROUPS
    description: Comma-separated GitLab group path allowlist
    required: true
  - name: FEISHU_APP_ID
    description: Hermes dispatcher bot App ID
    required: true
  - name: API_SERVER_PORT
    description: Gateway-local API port unique inside the container
    required: true
  - name: FEISHU_APP_SECRET
    description: Hermes dispatcher bot App Secret
    required: true
