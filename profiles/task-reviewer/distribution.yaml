name: task-reviewer
version: 0.2.0
description: Reviews the complete SPEC PLAN TASKS mapping with a digest-bound gate
hermes_requires: ">=0.19.0"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Reporter token with API permission to clone and comment on MRs
    required: true
