name: spec-writer
version: 0.1.0
description: Splits a merged PRD into ordered, independently reviewable specifications
hermes_requires: ">=0.18.2"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Spec writer token with branch and MR permission
    required: true
