name: spec-reviewer
version: 0.1.0
description: Reviews a SPEC against the merged PRD and emits a head-bound gate
hermes_requires: ">=0.18.2"
author: Hermes MES Team
license: Proprietary
env_requires:
  - name: GITLAB_HOST
    description: Private GitLab hostname
    required: true
  - name: GITLAB_TOKEN
    description: Spec reviewer token with MR comment permission
    required: true
